<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELECTROHUB</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: url("https://th.bing.com/th/id/OIP.6DnlUqJaBm5pu-jPeamUywHaEK?w=322&h=181");
    background-size: cover;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
}

.header a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-weight: bold;
}

/* SEARCH BAR */
.search-box input {
    padding: 8px;
    width: 250px;
    border-radius: 20px;
    border: none;
}

.search-box button {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: orange;
    cursor: pointer;
}

/* CATEGORY */
.categories {
    text-align: center;
    background: white;
    padding: 20px;
}

.categories img {
    height: 120px;
    margin: 10px;
}

/* BANNER */
.banner img {
    width: 100%;
    margin: 10px 0;
    border-radius: 10px;
}

/* SECTION */
.section {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
}

.section h2 {
    text-align: center;
}

.products img {
    width: 150px;
    margin: 10px;
}

/* FOOTER */
.footer {
    background: #131921;
    color: white;
    padding: 20px;
    text-align: center;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <div>
        <a href="#">ELECTROHUB</a>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button>🔍</button>
    </div>

    <div>

        <a href="#">CONTACT</a>

</div>

<!-- CATEGORIES -->

    <img src="https://media-ik.croma.com/prod/.../Air_Conditioner.png">

    <img src="https://media-ik.croma.com/prod/.../Laptops.png">
    <img src="https://media-ik.croma.com/prod/.../TV.png">
    <img src="https://media-ik.croma.com/prod/.../Tablets.png">
</div>

<!-- BANNER -->
<div class="banner">
    <img src="https://cdn.jiostore.online/...1770980205310.jpeg">
</div>

    <h2>🔥 Special Deals</h2>
    <div class="products" align="center">
        <img src="https://cdn.jiostore.online/...1770640550340.png">
        <img src="https://cdn.jiostore.online/...1770356851527.png">
        <img src="https://cdn.jiostore.online/...1769153918313.png">
        <img src="https://cdn.jiostore.online/...1770377408661.png">
    </div>
</div>

<!-- TABLETS -->
<div class="section">
    <h2>📱 Deals on Tablets</h2>
    <div class="products" align="center">
        <img src="https://cdn.jiostore.online/...ipad.jpeg">
        <img src="https://cdn.jiostore.online/...lenovo.jpeg">
        <img src="https://cdn.jiostore.online/...samsung.jpeg">
        <img src="https://cdn.jiostore.online/...oneplus.jpeg">

</div>

<!-- FOOTER -->
<div class="footer">
