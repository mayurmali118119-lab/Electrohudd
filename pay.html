<!DOCTYPE html>
<html>
<head>
<title>Payment App</title>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
}

.container{
    display:flex;
    align-items:center;
    gap:40px;
    padding:40px;
}

.qr-box{
    background:#000;
    padding:20px;
    border-radius:25px;
margin:70px;
}

.qr-box img{
    width:350px;
}

.payment-app{
    text-align:center;
}

.payment-app h2{
    margin-bottom:20px;
}

.logos{
    display:flex;
    gap:20px;
    justify-content:center;
}

.logos img{
    width:100px;
    height:80px;
    object-fit:contain;
}
.header {
    background: #131921;
    color: white;
    display: flex;
    align-items: center;
    padding: 10px 20px;
	}
.logo {
    font-size: 22px;
    font-weight: bold;
    margin-right: 20px;
}
.navbar {
    background: #232f3e;
    color: white;
    padding: 10px 20px;
}
.border{
border: 2px solid black;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">
	  ELECTROHUB </div>

 

  
</div>

<!-- NAVBAR -->
<div class="navbar">
    Electronics | Mobiles | Fashion | Deals
</div>

<div class="container">

   
    <div class="qr-box">
        <img src="ac.png" alt="PhonePe QR">
    </div>

   
    <div class="payment-app">
        <h2>Payment App</h2>

        <div class="logos">
            <img src="https://th.bing.com/th/id/OIP.tuYalZe2SOHuvjtZkDDJ5gHaFf?w=250&h=185&c=7&r=0&o=7&dpr=1.1&pid=1.7&rm=3">
            <img src="pay1.webp">
            <img src="pay3.webp">
            <img src="pay4.webp">
        </div>

        <p>Scan QR with any UPI app</p>
    </div>

</div>
</div>
</body>
</html>
